# GPT2-6M pretraining configuration
# Matches the architecture and training setup used for outpost-bio/MBT-6m-mgm

model:
  model_type: gpt2
  n_positions: 512
  n_embd: 256
  n_layer: 8
  n_head: 8

training:
  training_type: next_token_prediction
  taxon_rank: genus
  fallback_to_higher_rank: true
  max_length: 512
  learning_rate: 0.001
  warmup_steps: 1000
  weight_decay: 0.001
  batch_size: 32
  num_epochs: 100
  patience: 10
  eval_steps: 3261
  save_steps: 3261
  logging_steps: 100
  val_split: 0.1
  seed: 42
